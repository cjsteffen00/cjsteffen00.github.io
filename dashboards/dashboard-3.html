<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | AgriSense Analytics</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        .dashboard-wrapper {
            padding: 30px 40px;
            max-width: 1400px;
            margin: 0 auto;
            font-family: 'Inter', sans-serif;
        }
        
        /* Flexbox container to split button (left) and title (right) */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Updated Back Button with black outline */
        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: #000;
            font-weight: 600;
            border: 2px solid #000;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #000;
            color: #fff;
        }

        /* Updated Dashboard Title */
        .section-title {
            font-size: 3rem;
            margin: 0;
            font-family: 'Playfair Display', serif;
        }

        .tableau-container {
            width: 100%;
            height: 800px; /* Adjust based on your dashboard size */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 40px; /* Space between Tableau and analysis */
        }
        
        .tableau-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* New section for analysis text */
        .analysis-text {
            background-color: #f8f9fa;
            padding: 30px;
            border-radius: 8px;
            border-left: 4px solid #000;
            line-height: 1.6;
        }
        
        .analysis-text h3 {
            margin-top: 0;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <main class="dashboard-wrapper">
        
        <div class="dashboard-header">
            <a href="../index.html#deliverables" class="back-btn">&larr; Back to Main Site</a>
            <h2 class="section-title">Dash 3</h2>
        </div>
        
        <div class="tableau-container">
            <iframe src="YOUR_TABLEAU_PUBLIC_URL_HERE&:showVizHome=no&:embed=true" allowfullscreen></iframe>
        </div>

        <div class="analysis-text">
            <h3>Analysis Summary</h3>
            <p>Enter your heatmap analysis here. This space is designed to hold your insights, data trends, and any notable observations gathered from the Tableau visualization above. You can easily expand this text or add bullet points as needed.</p>
        </div>

    </main>
</body>
</html>
